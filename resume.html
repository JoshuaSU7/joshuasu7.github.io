		<!-- PDF.js (Mozilla) for canvas-based rendering of uploaded PDFs -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
		<script>
			// Configure PDF.js worker
			pdfjsLib.GlobalWorkerOptions.workerSrc =
				'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

			let pdfDoc      = null;
			let currentPage = 1;
			let totalPages  = 0;

			const uploadInput    = document.getElementById('pdf-upload');
			const uploadStatus   = document.getElementById('upload-status');
			const pdfEmbed       = document.getElementById('pdf-embed');
			const canvasWrapper  = document.getElementById('pdf-canvas-wrapper');
			const pdfNav         = document.getElementById('pdf-nav');
			const prevBtn        = document.getElementById('prev-page');
			const nextBtn        = document.getElementById('next-page');
			const pageInfo       = document.getElementById('page-info');
			const pdfLoading     = document.getElementById('pdf-loading');
			const downloadBtn    = document.getElementById('download-btn');

			function showLoading(show) {
				pdfLoading.classList.toggle('visible', show);
			}

			async function renderPage(num) {
				showLoading(true);
				const page    = await pdfDoc.getPage(num);
				const scale   = Math.min(canvasWrapper.clientWidth / page.getViewport({ scale: 1 }).width, 1.8);
				const viewport = page.getViewport({ scale });

				const canvas  = document.createElement('canvas');
				canvas.width  = viewport.width;
				canvas.height = viewport.height;
				const ctx     = canvas.getContext('2d');

				// Clear old canvases and render new
				canvasWrapper.innerHTML = '';
				canvasWrapper.appendChild(canvas);

				await page.render({ canvasContext: ctx, viewport }).promise;
				pageInfo.textContent = `Page ${num} of ${totalPages}`;
				prevBtn.disabled = num <= 1;
				nextBtn.disabled = num >= totalPages;
				showLoading(false);
			}

			async function loadPdfFromArrayBuffer(buffer, filename) {
				showLoading(true);
				pdfEmbed.style.display    = 'none';
				canvasWrapper.style.display = 'block';
				pdfNav.classList.add('visible');
				uploadStatus.textContent  = filename;

				pdfDoc       = await pdfjsLib.getDocument({ data: buffer }).promise;
				totalPages   = pdfDoc.numPages;
				currentPage  = 1;

				await renderPage(currentPage);
			}

			uploadInput.addEventListener('change', async (e) => {
				const file = e.target.files[0];
				if (!file || file.type !== 'application/pdf') return;

				const reader = new FileReader();
				reader.onload = async (ev) => {
					await loadPdfFromArrayBuffer(ev.target.result, file.name);

					// Update download link to local blob
					const blob = new Blob([ev.target.result], { type: 'application/pdf' });
					downloadBtn.href = URL.createObjectURL(blob);
					downloadBtn.download = file.name;
				};
				reader.readAsArrayBuffer(file);
			});

			prevBtn.addEventListener('click', async () => {
				if (currentPage > 1) { currentPage--; await renderPage(currentPage); }
			});
			nextBtn.addEventListener('click', async () => {
				if (currentPage < totalPages) { currentPage++; await renderPage(currentPage); }
			});

			// Check if resume.pdf exists in the repo; if not, the <object> shows the placeholder
			// No extra JS needed — the <object> tag handles it natively.
		</script>
